<style>
            .comment{

                margin-bottom: 16px;
                background: var(--card-bg-color);
                border: 1px solid transparent;
                border-radius: 8px;
                padding: 16px;
                box-shadow: var(--box-shadow);
                transition: all .3s ease;
                box-sizing: border-box;
                position: relative;
            }
            .comment.cursor-pointer{

            }
            .comment.glowing-anim{
                animation: glowing-anim 8s ease forwards;
            }
            .comment.glowing-anim .top-buttons{
                transition: none;
                opacity: 0 !important;
            }
            @keyframes glowing-anim{
                0%, 40%{background: #007aff38;}

            }
            .comment:hover{
                box-shadow: rgba(0, 0, 0, 0.06) 0px 16px 24px, rgba(0, 0, 0, 0.04) 0px 2px 6px, rgba(0, 0, 0, 0.04) 0px 0px 1px;
            }
            .comment.highlight{
                border-color: var(--primary-color);
                background: #ddf4fb;
            }
            .comment.appelation{
                transition: opacity .3s ease, all .3s .3s ease;
                overflow: hidden;
                height: 0 !important;
                opacity: 0;
                padding-top: 0;
                padding-bottom: 0;
                margin-bottom: 0px;
            }
            .comment .top{
                display: flex;
                -webkit-box-align: center;
                align-items: center;
                margin-bottom: 12px;
                overflow: hidden;
            }
            .comment .top-buttons{
                margin-left: auto;
                cursor: pointer;
                display: flex;
                -webkit-box-pack: center;
                justify-content: center;
                -webkit-box-align: center;
                align-items: center;
                opacity: 0;
                transition: opacity var(--transition);
                right: 16px;
                position: absolute;
                top: 16px;
                // background: linear-gradient(270deg, var(--card-bg-color) 20px, transparent 100%);
                backdrop-filter: var(--card-backdrop-filter)
                padding-left: 20px;
            }
            .comment .top-buttons div{
                width: 16px;
                height: 16px;
                margin-left: 12px;
                font-size: 16px;
                line-height: 17px;
                color: var(--gray-7);
                filter: brightness(1);
                transition: color var(--transition);
            }
            .comment .top-buttons div:hover{
                color: var(--gray-9);
                transition: color var(--transition-hover);
            }
            .comment:hover .top-buttons{
                opacity: 1;
                transition: opacity var(--transition-hover);
            }
            .mobile{
                display: none;
            }
            @media (max-width: 768px){
                .desktop{
                    display: none;
                }
                .mobile{
                    display: block;
                }
                .comment .top-buttons{
                    top: 22px;
                    right: 13px;
                    opacity: 1;
                }

                    padding-right: 26px;
                }
                .comment .date{
                    margin-left: 16px;
                }
            }
            .comment .avatar{
                width: 32px;
                height: 32px;
                border-radius: 50%;
                margin-right: 8px;
                background: #e6f7ff;
                border: 1px solid rgba(78, 134, 204, 0.4);

                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 0%;
                
                font-family: 'Stolzl Book', Helvetica, Arial, sans-serif;
                text-transform: uppercase;

            .comment .username{

                font-style: normal;
                font-weight: 400;
                font-size: 16px;

                overflow: hidden;

                font-weight: 400;
                font-size: 14px;
                line-height: 20px;
                color: var(--gray-9);
                overflow-wrap: break-word;

            .comment .date{

                font-weight: 400;
                font-size: 10px;
                line-height: 20px;
                color: var(--gray-7);
                white-space: nowrap;
            }
            .comment .replied{
                border: 1px solid var(--gray-5);
                border-radius: 8px;
                padding: 16px;
                margin-top: 16px;
                cursor: pointer;
            }
            .comment .replied .text:before{
                content: "Re:";
                color: var(--gray-9);
                display: inline-block;
                margin-right: 4px;
                font-weight: bold;
            }
            .comment .replied .text{
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 140%;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                text-overflow: ellipsis;
                padding: 0px;
                color: var(--gray-7);
                overflow-wrap: break-word;
            }
            @media (min-width: 768px){
                .comment .date{
                    font-size: 14px;
                }
            }
            .form{
                flex-shrink: 0;
                position: relative;
                border-radius: 8px;
                overflow: hidden;
            }
            .form textarea{
                display: block;
                padding: 16px 45px 16px 16px;
                font-family: "Stolzl Book", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 20px;
                color: var(--gray-9);
                border: 1px solid var(--gray-5);
                border-radius: 8px;
                transition: border-color 0.3s ease 0s;
                outline: none;
                width: 100%;
                resize: none;
                box-sizing: border-box;
                margin-top: 0;
                margin-bottom: 0;
                background-color: var(--card-bg-color);
            }
            .form button{
                position: absolute !important;
                right: 0px;
                cursor: pointer;
                top: 0px;
                bottom: 0px;

                border-image: initial;

                color: var(--gray-6);

                transition: background-color 0.3s ease 0s, color 0.3s ease 0s, border-color 0.3s ease 0s;

                border-right: 1px solid var(--gray-5);

            .form-notice{
                padding: 0px;

                font-weight: 400;
                font-size: 12px;
                line-height: 17px;
                color: var(--gray-9);
                margin-top: 20px;
                -webkit-box-flex: 1;flex-grow: 1;
            }
            .bottom{
                margin-top: 16px;
                display: flex;
                -webkit-box-align: center;
                align-items: center;
                -webkit-box-pack: justify;
            }
            .bottom .clear{
                flex-grow: 1;
            }
            .bottom .action{
                display: flex;
                -webkit-box-align: center;
                align-items: center;

                color: var(--gray-7);

                margin-right: 8px;
                z-index: 0;
            }
            .bottom .action.no-events{
                pointer-events: none;
            }
            .bottom .action .icon{
                color: var(--gray-7);
                transition: color 0.3s ease 0s;
                width: 16px;
                height: 16px;
                font-size: 16px;
                margin-right: 8px;
                position: relative;
                top: -1px;
                display: flex;
                -webkit-box-pack: center;
                justify-content: center;
                -webkit-box-align: center;
                align-items: center;
            }
            .bottom .action .text{
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 20px;
                color: var(--gray-7);
                transition: color 0.3s ease 0s;
            }
            .bottom .action.report{
                opacity: 0;
                transition: opacity var(--transition-hover);
            }
            .comment:hover .bottom .action.report{
                opacity: 1;
                transition: opacity var(--transition-hover);
            }
            .comment .bottom .action.report:hover .text{
                color: red;
            }
            .load-more{
                width: 100%;
                border-image: initial;
                background-color: var(--card-bg-color);
                color: var(--gray-6);
                border-radius: 8px;
                padding: 10px;
                font-size: 14px;
                border: 1px solid var(--gray-5);
                transition: all var(--transition);
                margin-bottom: 13px;
                text-align: center;
                cursor: pointer;
                box-sizing: border-box;
                position: relative;
            }
            .load-more:hover{
                transition: all var(--transition-hover)
            }
            .load-more.loading{
                color: #66666600;
            }
            .load-more.loading:after{
                opacity: 1;
            }
            .load-more:after{
                transition: all var(--transition);
                position: absolute;
                width: 144px;
                height: 18px;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                content: '';
                margin: auto;
                opacity: 0;
                filter: var(--light-button-loader-filer);
                transform: scale(0.7);
                background-image: url('img/loader.svg');
            }
            .form textarea:focus, .form textarea:active, .form.is-valid textarea, .form textarea:focus + button{
                border-color: var(--primary-color);
            }
            .form button{
                pointer-events: none;
            }
            .form.is-valid button{
                border-color: var(--primary-color);
                background-color: var(--primary-color);
                color: var(--gray-1);
                pointer-events: auto;
            }
            .comment-form-wrapper{
                display: flex;
                width: 100%;
                margin-top: 40px;
                flex-direction: column;
            }
            
            .comment-form-wrapper .form textarea{
                min-height: 114px;
                height: 100%;
            }

            .loginalert{
                padding: 24px;
                background: var(--card-bg-color);
                border-radius: 8px;
                margin-top: 40px;
                max-width: 100%;
            }

            .loginalert-message{
                display: flex;
                align-items: center;
                margin-bottom: 20px;
                justify-content: center;
            }
            .loginalert .icon{
                width: 24px;
                height: 24px;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--primary-color);
            }
            .loginalert .text{
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 20px;
                color: var(--gray-9);

            .loginalert .buttons{
                display: flex;
                align-items: center;
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 22px;
                color: var(--gray-7);
                justify-content: center;
            }
            .loginalert .buttons a{
                text-decoration: none;
            }
            .loginalert .buttons div{
                font-style: normal;
                font-weight: 400;
                font-size: 14px;
                line-height: 22px;
                color: var(--gray-7);
                margin: 0px 16px;
            }
            
            @media screen and (min-width: 768px) {
                .comment-form-wrapper{
                    flex-direction: row;
                }

                    justify-content: space-between;
                }
                .loginalert-message{

                }
                .form-notice{
                    padding-left: 24px;
                    margin-left: 24px;

                }
                            
            }

                font-weight: 400;

            }
            button[theme="primary"]:hover{

            }

                align-items: center;
            }
            .bottom .action.likes .icon{

            }

            .comment .liked-users-list{

            }

            }

            .comment .expand-trigger{

            .comment .expanded .expand-trigger{
                opacity: 0;
                transition: opacity .15s;
                pointer-events: none;

            .comment .liked-users-list:not(.expanded) z-account:nth-child(5),
            .comment .liked-users-list:not(.expanded) z-account:nth-child(6),
            .comment .liked-users-list:not(.expanded) z-account:nth-child(7),

                margin-left: -36px;
                pointer-events: none;

                color:var(--gray-9);
