<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>专注统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #263238;
            padding: 40px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .title {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .date-range {
            font-size: 14px;
            color: #90a4ae;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #4fc3f7;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #90a4ae;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .week-chart {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 150px;
            padding: 0 10px;
        }
        .day-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .bar {
            width: 40px;
            background: linear-gradient(to top, #0277bd, #4fc3f7);
            border-radius: 4px 4px 0 0;
            transition: all 0.3s;
        }
        .bar:hover {
            background: linear-gradient(to top, #4fc3f7, #81d4fa);
        }
        .day-label {
            margin-top: 10px;
            font-size: 12px;
            color: #90a4ae;
        }
        .bar-value {
            font-size: 11px;
            color: #4fc3f7;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">专注统计</div>
            <div class="date-range">February 1-7, 2026</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">42h</div>
                <div class="stat-label">Total Focus</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">6.0h</div>
                <div class="stat-label">Daily Avg</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">18</div>
                <div class="stat-label">Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">87%</div>
                <div class="stat-label">Completion</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Weekly Focus Hours</div>
            <div class="week-chart">
                <div class="day-bar">
                    <div class="bar-value">5h</div>
                    <div class="bar" style="height: 50px;"></div>
                    <div class="day-label">Mon</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">7h</div>
                    <div class="bar" style="height: 70px;"></div>
                    <div class="day-label">Tue</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">6h</div>
                    <div class="bar" style="height: 60px;"></div>
                    <div class="day-label">Wed</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">8h</div>
                    <div class="bar" style="height: 80px;"></div>
                    <div class="day-label">Thu</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">5h</div>
                    <div class="bar" style="height: 50px;"></div>
                    <div class="day-label">Fri</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">4h</div>
                    <div class="bar" style="height: 40px;"></div>
                    <div class="day-label">Sat</div>
                </div>
                <div class="day-bar">
                    <div class="bar-value">7h</div>
                    <div class="bar" style="height: 70px;"></div>
                    <div class="day-label">Sun</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
