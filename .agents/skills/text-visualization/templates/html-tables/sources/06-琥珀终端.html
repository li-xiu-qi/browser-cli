<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>琥珀终端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Courier New", "Lucida Console", monospace;
            background: #0c0c0c;
            padding: 40px;
            color: #ffb000;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #ffb000;
            padding: 30px;
            background: #0a0a0a;
            box-shadow: 0 0 20px rgba(255, 176, 0, 0.1);
        }
        .header {
            border-bottom: 1px solid #664400;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 16px;
            letter-spacing: 2px;
        }
        .prompt {
            color: #664400;
            font-size: 12px;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 12px;
            color: #664400;
            border-bottom: 1px solid #332200;
            font-weight: normal;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #1a1100;
        }
        tr:hover td {
            background: rgba(255, 176, 0, 0.05);
        }
        .ok { color: #00ff00; }
        .warn { color: #ff8800; }
        .err { color: #ff0000; }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #ffb000;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">[SYSTEM MONITOR]</div>
            <div class="prompt">root@server:~$ status --all<span class="cursor"></span></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>PROCESS</th>
                    <th>PID</th>
                    <th>CPU %</th>
                    <th>MEM</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>nginx</td>
                    <td>1024</td>
                    <td>2.3%</td>
                    <td>156M</td>
                    <td class="ok">[RUNNING]</td>
                </tr>
                <tr>
                    <td>postgres</td>
                    <td>2048</td>
                    <td>8.7%</td>
                    <td>512M</td>
                    <td class="ok">[RUNNING]</td>
                </tr>
                <tr>
                    <td>redis</td>
                    <td>3072</td>
                    <td>1.2%</td>
                    <td>64M</td>
                    <td class="warn">[WARNING]</td>
                </tr>
                <tr>
                    <td>worker-01</td>
                    <td>4096</td>
                    <td>0.0%</td>
                    <td>—</td>
                    <td class="err">[FAILED]</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
