<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>周计划</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #fff;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #1a1a2e;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .week-info {
            font-size: 14px;
            color: #666;
        }
        .schedule {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 2px;
            background: #eee;
            border: 2px solid #1a1a2e;
        }
        .cell {
            background: #fff;
            padding: 8px;
            font-size: 11px;
            min-height: 60px;
        }
        .cell.header {
            background: #1a1a2e;
            color: #fff;
            font-weight: 600;
            text-align: center;
            min-height: auto;
        }
        .cell.time {
            background: #f5f5f5;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell.content {
            position: relative;
        }
        .event {
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-bottom: 2px;
        }
        .event.study { background: #e3f2fd; color: #1565c0; }
        .event.work { background: #f3e5f5; color: #7b1fa2; }
        .event.exercise { background: #e8f5e9; color: #2e7d32; }
        .event.rest { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Week 06 Study Plan</div>
            <div class="week-info">Feb 5 - Feb 11, 2026</div>
        </div>
        <div class="schedule">
            <div class="cell header">Time</div>
            <div class="cell header">Mon</div>
            <div class="cell header">Tue</div>
            <div class="cell header">Wed</div>
            <div class="cell header">Thu</div>
            <div class="cell header">Fri</div>
            <div class="cell header">Sat</div>
            <div class="cell header">Sun</div>
            
            <div class="cell time">08:00</div>
            <div class="cell content"><div class="event study">Deep Learning</div></div>
            <div class="cell content"><div class="event study">Reading</div></div>
            <div class="cell content"><div class="event study">Deep Learning</div></div>
            <div class="cell content"><div class="event study">Paper Review</div></div>
            <div class="cell content"><div class="event study">Project</div></div>
            <div class="cell content"><div class="event exercise">Running</div></div>
            <div class="cell content"><div class="event rest">Rest</div></div>
            
            <div class="cell time">14:00</div>
            <div class="cell content"><div class="event work">Coding</div></div>
            <div class="cell content"><div class="event work">Meeting</div></div>
            <div class="cell content"><div class="event work">Coding</div></div>
            <div class="cell content"><div class="event work">Review</div></div>
            <div class="cell content"><div class="event work">Deploy</div></div>
            <div class="cell content"><div class="event study">Side Project</div></div>
            <div class="cell content"><div class="event rest">Family</div></div>
            
            <div class="cell time">20:00</div>
            <div class="cell content"><div class="event exercise">Gym</div></div>
            <div class="cell content"><div class="event rest">Reading</div></div>
            <div class="cell content"><div class="event exercise">Yoga</div></div>
            <div class="cell content"><div class="event rest">Movie</div></div>
            <div class="cell content"><div class="event rest">Game</div></div>
            <div class="cell content"><div class="event rest">Social</div></div>
            <div class="cell content"><div class="event rest">Plan</div></div>
        </div>
    </div>
</body>
</html>
