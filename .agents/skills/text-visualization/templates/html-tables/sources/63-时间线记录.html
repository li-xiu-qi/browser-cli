<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间线记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            padding: 40px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #264653;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #264653;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #264653;
        }
        
        .event {
            position: relative;
            margin-bottom: 24px;
            padding: 16px;
            border: 1px solid #000;
            background: #fff;
        }
        
        .event::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: #264653;
            border: 2px solid #fff;
            border-radius: 50%;
        }
        
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .event-time {
            font-family: "SF Mono", monospace;
            font-size: 12px;
            color: #264653;
            font-weight: 600;
        }
        
        .event-type {
            font-size: 11px;
            padding: 2px 8px;
            font-weight: 600;
        }
        
        .type-tool {
            background: #2a9d8f;
            color: #fff;
        }
        
        .type-llm {
            background: #e9c46a;
            color: #333;
        }
        
        .type-error {
            background: #e76f51;
            color: #fff;
        }
        
        .event-content {
            font-size: 13px;
            line-height: 1.6;
            color: #333;
        }
        
        .event-detail {
            font-family: "SF Mono", monospace;
            font-size: 11px;
            background: #f5f5f5;
            padding: 8px;
            margin-top: 8px;
            border-left: 3px solid #264653;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Agent 执行日志</div>
        
        <div class="timeline">
            <div class="event">
                <div class="event-header">
                    <span class="event-time">14:32:05</span>
                    <span class="event-type type-llm">THOUGHT</span>
                </div>
                <div class="event-content">用户需要查询北京今天的天气，我应该使用 web_search 工具</div>
            </div>
            
            <div class="event">
                <div class="event-header">
                    <span class="event-time">14:32:06</span>
                    <span class="event-type type-tool">ACTION</span>
                </div>
                <div class="event-content">调用工具 web_search</div>
                <div class="event-detail">query: "北京天气 2026-02-05"</div>
            </div>
            
            <div class="event">
                <div class="event-header">
                    <span class="event-time">14:32:08</span>
                    <span class="event-type type-llm">OBSERVATION</span>
                </div>
                <div class="event-content">获取到天气数据：晴，温度 -2°C ~ 8°C</div>
            </div>
            
            <div class="event">
                <div class="event-header">
                    <span class="event-time">14:32:09</span>
                    <span class="event-type type-llm">FINAL</span>
                </div>
                <div class="event-content">生成最终回复给用户</div>
            </div>
        </div>
    </div>
</body>
</html>
