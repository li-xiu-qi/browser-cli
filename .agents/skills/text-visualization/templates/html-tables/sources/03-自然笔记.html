<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>自然学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            padding: 50px;
            min-height: 100vh;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            padding: 35px;
            border: 1px solid #a5d6a7;
        }
        .title {
            font-size: 20px;
            color: #2e7d32;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #81c784;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }
        th {
            background: #e8f5e9;
            color: #1b5e20;
            padding: 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #66bb6a;
        }
        td {
            padding: 14px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
        }
        tr:hover td {
            background: #f1f8e9;
        }
        .progress {
            display: inline-block;
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4caf50;
            border-radius: 4px;
        }
        .status-done { color: #2e7d32; font-weight: 600; }
        .status-progress { color: #f57c00; }
        .status-pending { color: #9e9e9e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">本周学习计划</div>
        <table>
            <thead>
                <tr>
                    <th>主题</th>
                    <th>预计时长</th>
                    <th>进度</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>深度学习基础</td>
                    <td>10小时</td>
                    <td><span class="progress"><span class="progress-bar" style="width: 100%"></span></span></td>
                    <td class="status-done">完成</td>
                </tr>
                <tr>
                    <td>Python 进阶</td>
                    <td>8小时</td>
                    <td><span class="progress"><span class="progress-bar" style="width: 75%"></span></span></td>
                    <td class="status-progress">进行中</td>
                </tr>
                <tr>
                    <td>数据可视化</td>
                    <td>6小时</td>
                    <td><span class="progress"><span class="progress-bar" style="width: 30%"></span></span></td>
                    <td class="status-progress">进行中</td>
                </tr>
                <tr>
                    <td>论文阅读</td>
                    <td>4小时</td>
                    <td><span class="progress"><span class="progress-bar" style="width: 0%"></span></span></td>
                    <td class="status-pending">待开始</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
