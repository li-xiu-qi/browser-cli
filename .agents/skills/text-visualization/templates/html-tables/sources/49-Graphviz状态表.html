<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphviz 风格状态表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", -apple-system, sans-serif;
            background: #fff;
            padding: 40px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border: 1px solid #264653;
        }
        
        th {
            background: #264653;
            color: #fff;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #264653;
        }
        
        td {
            padding: 12px 16px;
            border: 1px solid #ddd;
            color: #333;
        }
        
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        tr:nth-child(odd) {
            background: #fff;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        
        .done {
            background: #2a9d8f;
        }
        
        .progress {
            background: #e9c46a;
            color: #333;
        }
        
        .pending {
            background: #e76f51;
        }
    </style>
</head>
<body>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>任务</th>
                    <th>负责人</th>
                    <th>进度</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>需求分析</td>
                    <td>张三</td>
                    <td>100%</td>
                    <td><span class="status done">已完成</span></td>
                </tr>
                <tr>
                    <td>UI 设计</td>
                    <td>李四</td>
                    <td>75%</td>
                    <td><span class="status progress">进行中</span></td>
                </tr>
                <tr>
                    <td>后端开发</td>
                    <td>王五</td>
                    <td>30%</td>
                    <td><span class="status progress">进行中</span></td>
                </tr>
                <tr>
                    <td>测试验收</td>
                    <td>赵六</td>
                    <td>0%</td>
                    <td><span class="status pending">待开始</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
