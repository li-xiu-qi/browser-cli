<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴簿 Scrapbook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #8b7355;
            padding: 40px;
            color: #3d3d3d;
        }
        
        .scrapbook {
            max-width: 850px;
            margin: 0 auto;
            background: #3d3d3d;
            padding: 25px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
        }
        
        .scrap-page {
            background: #f5f1e8;
            padding: 35px;
            box-shadow: inset 0 0 100px rgba(139,115,85,0.1);
        }
        
        .scrap-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .scrap-title {
            font-size: 28px;
            font-weight: bold;
            color: #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        
        .scrap-date {
            font-size: 12px;
            color: #8b7355;
            font-style: italic;
        }
        
        .scrap-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }
        
        .scrap-item {
            background: #fff;
            padding: 20px;
            box-shadow: 2px 3px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .scrap-item::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 12px;
            background: #d4c4a8;
            opacity: 0.6;
        }
        
        .scrap-item:nth-child(1) { transform: rotate(-1deg); }
        .scrap-item:nth-child(2) { transform: rotate(1deg); background: #faf8f3; }
        .scrap-item:nth-child(3) { transform: rotate(0.5deg); background: #fffef8; }
        .scrap-item:nth-child(4) { transform: rotate(-0.5deg); background: #f9f7f2; }
        
        .item-title {
            font-size: 14px;
            font-weight: bold;
            color: #5a4a3a;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d4c4a8;
        }
        
        .scrap-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .scrap-table td {
            padding: 8px 5px;
            border-bottom: 1px dotted #d0c4b0;
        }
        
        .scrap-table td:first-child {
            font-weight: bold;
            color: #8b7355;
        }
        
        .polaroid {
            text-align: center;
            padding: 10px 10px 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .polaroid-img {
            width: 100%;
            height: 100px;
            background: #e8e0d5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .polaroid-caption {
            font-size: 11px;
            color: #666;
            font-family: 'Courier New', monospace;
        }
        
        .ticket {
            border: 2px dashed #8b7355;
            padding: 15px;
            text-align: center;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(139,115,85,0.05) 10px,
                rgba(139,115,85,0.05) 20px
            );
        }
        
        .ticket-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b7355;
            margin-bottom: 5px;
        }
        
        .ticket-value {
            font-size: 24px;
            font-weight: bold;
            color: #5a4a3a;
        }
        
        .scrap-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #8b7355;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="scrapbook">
        <div class="scrap-page">
            <div class="scrap-header">
                <div class="scrap-title">Monthly Review</div>
                <div class="scrap-date">February 2026 - A Collection of Memories</div>
            </div>
            
            <div class="scrap-grid">
                <div class="scrap-item">
                    <div class="item-title">本月成就 Highlights</div>
                    <table class="scrap-table">
                        <tr>
                            <td>阅读</td>
                            <td>4 本书</td>
                            <td>★★★★★</td>
                        </tr>
                        <tr>
                            <td>项目</td>
                            <td>2 个完成</td>
                            <td>★★★★☆</td>
                        </tr>
                        <tr>
                            <td>笔记</td>
                            <td>156 条</td>
                            <td>★★★★★</td>
                        </tr>
                        <tr>
                            <td>运动</td>
                            <td>18 天</td>
                            <td>★★★☆☆</td>
                        </tr>
                    </table>
                </div>
                
                <div class="scrap-item">
                    <div class="polaroid">
                        <div class="polaroid-img">[img]</div>
                        <div class="polaroid-caption">本月最爱书籍</div>
                    </div>
                </div>
                
                <div class="scrap-item">
                    <div class="item-title">下月目标 Goals</div>
                    <table class="scrap-table">
                        <tr>
                            <td>→</td>
                            <td>启动新项目 X</td>
                        </tr>
                        <tr>
                            <td>→</td>
                            <td>学习 Rust 基础</td>
                        </tr>
                        <tr>
                            <td>→</td>
                            <td>每周运动 4 次</td>
                        </tr>
                        <tr>
                            <td>→</td>
                            <td>整理知识库</td>
                        </tr>
                    </table>
                </div>
                
                <div class="scrap-item">
                    <div class="ticket">
                        <div class="ticket-title">Focus Score</div>
                        <div class="ticket-value">87</div>
                    </div>
                </div>
            </div>
            
            <div class="scrap-footer">
                收集自生活的碎片，拼成成长的轨迹
            </div>
        </div>
    </div>
</body>
</html>
