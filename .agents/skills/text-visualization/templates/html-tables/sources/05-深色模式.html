<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>高对比黑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            padding: 60px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }
        th {
            text-align: left;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            font-weight: 400;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td {
            padding: 24px 0;
            border-bottom: 1px solid #222;
        }
        tr:hover td {
            border-bottom-color: #fff;
        }
        .num {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 24px;
        }
        .label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Performance Metrics</div>
        <table>
            <thead>
                <tr>
                    <th>Metric</th>
                    <th>Current</th>
                    <th>Previous</th>
                    <th>Change</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="num">94.2%</div>
                        <div class="label">Accuracy</div>
                    </td>
                    <td>
                        <div class="num">0.847</div>
                        <div class="label">F1 Score</div>
                    </td>
                    <td>
                        <div class="num">0.823</div>
                        <div class="label">Last Week</div>
                    </td>
                    <td>
                        <div class="num" style="color: #4caf50;">+2.9%</div>
                        <div class="label">Improvement</div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="num">12ms</div>
                        <div class="label">Latency</div>
                    </td>
                    <td>
                        <div class="num">2.4k</div>
                        <div class="label">RPS</div>
                    </td>
                    <td>
                        <div class="num">2.1k</div>
                        <div class="label">Last Week</div>
                    </td>
                    <td>
                        <div class="num" style="color: #4caf50;">+14%</div>
                        <div class="label">Throughput</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
