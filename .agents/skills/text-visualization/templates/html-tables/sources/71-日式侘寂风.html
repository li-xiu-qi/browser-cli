<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日式侘寂风</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Serif JP", "Hiragino Mincho Pro", serif;
            background: #f7f5f0;
            padding: 80px 60px;
            color: #4a4a48;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .title {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 8px;
            color: #8b8680;
            margin-bottom: 30px;
        }
        
        .divider {
            width: 40px;
            height: 1px;
            background: #c4b8a8;
            margin: 0 auto 30px;
        }
        
        .subtitle {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #4a4a48;
        }
        
        .content {
            background: #fffef8;
            padding: 50px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
        }
        
        .item {
            padding: 30px 0;
            border-bottom: 1px solid #e8e4dc;
            display: flex;
            align-items: baseline;
        }
        
        .item:last-child {
            border-bottom: none;
        }
        
        .item-num {
            font-size: 12px;
            color: #b8b0a0;
            letter-spacing: 2px;
            width: 40px;
        }
        
        .item-content {
            flex: 1;
        }
        
        .item-title {
            font-size: 16px;
            font-weight: 500;
            color: #4a4a48;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .item-desc {
            font-size: 13px;
            color: #8b8680;
            font-weight: 300;
            line-height: 1.8;
        }
        
        .item-status {
            font-size: 11px;
            letter-spacing: 2px;
            color: #b8b0a0;
            padding-left: 20px;
        }
        
        .status-complete {
            color: #6b8e6b;
        }
        
        .status-doing {
            color: #b8a070;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
        }
        
        .seal {
            width: 60px;
            height: 60px;
            border: 1px solid #c4b8a8;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            letter-spacing: 2px;
            color: #c4b8a8;
        }
        
        .footer-text {
            font-size: 11px;
            color: #b8b0a0;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">進捗状況</div>
            <div class="divider"></div>
            <div class="subtitle">開発の道</div>
        </div>
        
        <div class="content">
            <div class="item">
                <div class="item-num">壱</div>
                <div class="item-content">
                    <div class="item-title">設計</div>
                    <div class="item-desc">Architecture and system design</div>
                </div>
                <div class="item-status status-complete">完了</div>
            </div>
            <div class="item">
                <div class="item-num">弐</div>
                <div class="item-content">
                    <div class="item-title">実装</div>
                    <div class="item-desc">Core functionality implementation</div>
                </div>
                <div class="item-status status-complete">完了</div>
            </div>
            <div class="item">
                <div class="item-num">参</div>
                <div class="item-content">
                    <div class="item-title">試験</div>
                    <div class="item-desc">Testing and quality assurance</div>
                </div>
                <div class="item-status status-doing">進行中</div>
            </div>
            <div class="item">
                <div class="item-num">四</div>
                <div class="item-content">
                    <div class="item-title">展開</div>
                    <div class="item-desc">Deployment and release</div>
                </div>
                <div class="item-status">未着手</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="seal">完</div>
            <div class="footer-text">令和八年二月</div>
        </div>
    </div>
</body>
</html>
