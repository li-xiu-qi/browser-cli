<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphviz 精准复刻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background: #fff;
            padding: 40px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border: 1.5px solid #000;
        }
        
        th {
            background: #264653;
            color: #fff;
            padding: 14px 16px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #000;
        }
        
        td {
            padding: 12px 16px;
            border: 1px solid #000;
            text-align: center;
            color: #000;
        }
        
        /* 状态列特殊样式 */
        .status-done {
            background: #2a9d8f;
            color: #fff;
            font-weight: normal;
        }
        
        .status-progress {
            background: #e9c46a;
            color: #333;
            font-weight: normal;
        }
        
        .status-pending {
            background: #e76f51;
            color: #fff;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>任务</th>
                    <th>负责人</th>
                    <th>进度</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>需求分析</td>
                    <td>张三</td>
                    <td>100%</td>
                    <td class="status-done">已完成</td>
                </tr>
                <tr>
                    <td>UI 设计</td>
                    <td>李四</td>
                    <td>75%</td>
                    <td class="status-progress">进行中</td>
                </tr>
                <tr>
                    <td>后端开发</td>
                    <td>王五</td>
                    <td>30%</td>
                    <td class="status-progress">进行中</td>
                </tr>
                <tr>
                    <td>测试验收</td>
                    <td>赵六</td>
                    <td>0%</td>
                    <td class="status-pending">待开始</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
