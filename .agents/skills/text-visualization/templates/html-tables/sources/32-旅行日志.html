<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行日志 Travel Log</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #d4c4a8;
            padding: 40px;
            color: #3d3d3d;
        }
        
        .passport-container {
            max-width: 800px;
            margin: 0 auto;
            background: #f5f1e8;
            padding: 35px;
            border: 8px solid #8b7355;
            box-shadow: 
                inset 0 0 60px rgba(139,115,85,0.1),
                3px 5px 20px rgba(0,0,0,0.2);
        }
        
        .passport-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px double #8b7355;
        }
        
        .passport-emblem {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .passport-title {
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: bold;
            color: #5a4a3a;
        }
        
        .passport-subtitle {
            font-size: 12px;
            color: #8b7355;
            margin-top: 5px;
        }
        
        .stamp-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stamp {
            width: 70px;
            height: 70px;
            border: 3px solid #c0392b;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #c0392b;
            transform: rotate(-15deg);
            opacity: 0.8;
        }
        
        .stamp-date {
            font-weight: bold;
            font-size: 11px;
        }
        
        .travel-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        
        .travel-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b7355;
            border-bottom: 1px solid #d0c4b0;
        }
        
        .travel-table td {
            padding: 14px 12px;
            background: rgba(255,255,255,0.4);
            border-top: 1px solid #d0c4b0;
            border-bottom: 1px solid #d0c4b0;
        }
        
        .location {
            font-weight: bold;
            color: #5a4a3a;
        }
        
        .date {
            font-size: 11px;
            color: #8b7355;
            font-family: 'Courier New', monospace;
        }
        
        .notes {
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="passport-container">
        <div class="passport-header">
            <div class="passport-emblem">✈</div>
            <div class="passport-title">TRAVEL LOG</div>
            <div class="passport-subtitle">学习之旅记录 LEARNING JOURNEY</div>
        </div>
        
        <div class="stamp-row">
            <div class="stamp">
                <div class="stamp-date">FEB</div>
                <div>05</div>
                <div style="font-size: 7px;">2026</div>
            </div>
            <div class="stamp" style="transform: rotate(10deg); border-color: #2980b9; color: #2980b9;">
                <div class="stamp-date">MAR</div>
                <div>12</div>
            </div>
            <div class="stamp" style="transform: rotate(-5deg); border-color: #27ae60; color: #27ae60;">
                <div class="stamp-date">APR</div>
                <div>08</div>
            </div>
        </div>
        
        <table class="travel-table">
            <thead>
                <tr>
                    <th>Destination</th>
                    <th>Duration</th>
                    <th>Highlights</th>
                    <th>Memory</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="location">Python 进阶</div>
                        <div class="date">2026.02.01-15</div>
                    </td>
                    <td>2 weeks</td>
                    <td class="notes">装饰器、生成器、异步</td>
                    <td>★★★★★</td>
                </tr>
                <tr>
                    <td>
                        <div class="location">系统设计</div>
                        <div class="date">2026.03.01-20</div>
                    </td>
                    <td>3 weeks</td>
                    <td class="notes">分布式、缓存、数据库</td>
                    <td>★★★★☆</td>
                </tr>
                <tr>
                    <td>
                        <div class="location">AI 应用开发</div>
                        <div class="date">2026.04.05-25</div>
                    </td>
                    <td>3 weeks</td>
                    <td class="notes">LLM、RAG、Agent</td>
                    <td>★★★★★</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
