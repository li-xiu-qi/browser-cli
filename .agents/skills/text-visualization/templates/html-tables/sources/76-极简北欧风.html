<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简北欧风</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #faf9f7;
            padding: 60px;
            color: #2c3e50;
        }
        
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 50px;
        }
        
        .pretitle {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #95a5a6;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 32px;
            font-weight: 300;
            color: #2c3e50;
            line-height: 1.3;
        }
        
        .title strong {
            font-weight: 500;
        }
        
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
        }
        
        .stats-row {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .stat {
            flex: 1;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 300;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #95a5a6;
            letter-spacing: 1px;
        }
        
        .divider {
            height: 1px;
            background: #ecf0f1;
            margin: 25px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            text-align: left;
            padding: 12px 0;
            font-weight: 500;
            color: #95a5a6;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        td {
            padding: 16px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.green {
            background: #27ae60;
        }
        
        .status-dot.orange {
            background: #f39c12;
        }
        
        .progress-bar {
            width: 100px;
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #3498db;
            border-radius: 2px;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="pretitle">Weekly Report</div>
            <div class="title">Team <strong>Performance</strong> Overview</div>
        </div>
        
        <div class="card">
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-value">94%</div>
                    <div class="stat-label">Tasks Completed</div>
                </div>
                <div class="stat">
                    <div class="stat-value">12</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat">
                    <div class="stat-value">3</div>
                    <div class="stat-label">Blocked</div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Assignee</th>
                        <th>Progress</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>API Documentation</td>
                        <td>Sarah Chen</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 100%"></div>
                            </div>
                        </td>
                        <td>
                            <span class="status">
                                <span class="status-dot green"></span>
                                Done
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td>Database Optimization</td>
                        <td>Mike Ross</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 75%"></div>
                            </div>
                        </td>
                        <td>
                            <span class="status">
                                <span class="status-dot green"></span>
                                On Track
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td>Auth Integration</td>
                        <td>Emma Wilson</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 45%"></div>
                            </div>
                        </td>
                        <td>
                            <span class="status">
                                <span class="status-dot orange"></span>
                                At Risk
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td>UI Components</td>
                        <td>James Lee</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 90%"></div>
                            </div>
                        </td>
                        <td>
                            <span class="status">
                                <span class="status-dot green"></span>
                                Review
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <div>Week 06, 2026</div>
            <div>Generated by Project OS</div>
        </div>
    </div>
</body>
</html>
