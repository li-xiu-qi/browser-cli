<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>复习矩阵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #fff8e1;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: #5d4037;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 13px;
            color: #8d6e63;
            margin-bottom: 30px;
        }
        .matrix {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .matrix-header {
            display: grid;
            grid-template-columns: 2fr repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #5d4037;
        }
        .matrix-col-title {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #5d4037;
        }
        .matrix-row {
            display: grid;
            grid-template-columns: 2fr repeat(5, 1fr);
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
        }
        .matrix-row:last-child {
            border-bottom: none;
        }
        .topic-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .review-cell {
            text-align: center;
        }
        .review-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
        }
        .dot-done {
            background: #4caf50;
            color: white;
        }
        .dot-miss {
            background: #ffcdd2;
            color: #c62828;
        }
        .dot-scheduled {
            background: #fff3e0;
            color: #ef6c00;
            border: 2px dashed #ef6c00;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">艾宾浩斯复习表</div>
        <div class="subtitle">根据遗忘曲线安排复习时间</div>
        
        <div class="matrix">
            <div class="matrix-header">
                <div></div>
                <div class="matrix-col-title">Day 1</div>
                <div class="matrix-col-title">Day 2</div>
                <div class="matrix-col-title">Day 4</div>
                <div class="matrix-col-title">Day 7</div>
                <div class="matrix-col-title">Day 15</div>
            </div>
            
            <div class="matrix-row">
                <div class="topic-name">微积分基础</div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
            </div>
            
            <div class="matrix-row">
                <div class="topic-name">线性代数</div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-miss" style="font-size:10px;">no</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
            </div>
            
            <div class="matrix-row">
                <div class="topic-name">概率论</div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
            </div>
            
            <div class="matrix-row">
                <div class="topic-name">Python基础</div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-done" style="font-size:10px;">ok</span></div>
                <div class="review-cell"><span class="review-dot dot-scheduled">-</span></div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <span class="review-dot dot-done" style="width:16px;height:16px;font-size:9px;">ok</span>
                <span>已完成</span>
            </div>
            <div class="legend-item">
                <span class="review-dot dot-miss" style="width:16px;height:16px;font-size:9px;">no</span>
                <span>遗漏</span>
            </div>
            <div class="legend-item">
                <span class="review-dot dot-scheduled" style="width:16px;height:16px;font-size:9px;">-</span>
                <span>计划中</span>
            </div>
        </div>
    </div>
</body>
</html>
