<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧凑代码对照</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "SF Mono", Monaco, "Microsoft YaHei", sans-serif;
            background: #fff;
            padding: 30px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .title {
            font-size: 14px;
            font-weight: bold;
            color: #264653;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #264653;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            border: 1.5px solid #000;
        }
        
        th {
            background: #264653;
            color: #fff;
            padding: 8px 10px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #000;
            font-size: 11px;
        }
        
        td {
            padding: 6px 10px;
            border: 1px solid #000;
            color: #000;
            font-family: "SF Mono", monospace;
            line-height: 1.4;
        }
        
        .old {
            background: #fff5f5;
            color: #c53030;
        }
        
        .new {
            background: #f0fff4;
            color: #276749;
        }
        
        .label {
            display: inline-block;
            padding: 1px 6px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .label-old {
            background: #e76f51;
            color: #fff;
        }
        
        .label-new {
            background: #2a9d8f;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">API 变更对照 (v0.9 → v1.0)</div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">类型</th>
                    <th>旧版本 (v0.9)</th>
                    <th>新版本 (v1.0)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="label label-old">OLD</span></td>
                    <td class="old">agent.run(prompt, tools)</td>
                    <td class="new"><span class="label label-new">NEW</span> agent.run(prompt, tools=tools)</td>
                </tr>
                <tr>
                    <td><span class="label label-old">OLD</span></td>
                    <td class="old">@tool(name="search")</td>
                    <td class="new"><span class="label label-new">NEW</span> @tool</td>
                </tr>
                <tr>
                    <td><span class="label label-old">OLD</span></td>
                    <td class="old">max_iterations=10</td>
                    <td class="new"><span class="label label-new">NEW</span> max_steps=10</td>
                </tr>
                <tr>
                    <td><span class="label label-old">OLD</span></td>
                    <td class="old">return_code=True</td>
                    <td class="new"><span class="label label-new">NEW</span> executor=CodeExecutor()</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
