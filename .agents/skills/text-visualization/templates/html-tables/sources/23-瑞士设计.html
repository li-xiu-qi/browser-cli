<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>瑞士风格</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #fff;
            padding: 60px;
            color: #000;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        /* 瑞士风格特点：网格系统、不对称、功能优先 */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 20px;
        }
        .title-block {
            grid-column: 1 / 5;
            border-bottom: 3px solid #000;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        .subtitle {
            font-size: 14px;
            margin-top: 10px;
            color: #666;
        }
        .data-table {
            grid-column: 1 / -1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 15px 0;
            border-bottom: 2px solid #000;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        td {
            padding: 18px 0;
            border-bottom: 1px solid #ddd;
        }
        .number {
            font-family: "Helvetica Neue", Arial, sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -2px;
        }
        .label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid">
            <div class="title-block">
                <div class="title">Research Findings</div>
                <div class="subtitle">Q1 2026 Data Analysis</div>
            </div>
            
            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th>Metric</th>
                            <th>Current</th>
                            <th>Previous</th>
                            <th>Change</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="number">94.2%</div>
                                <div class="label">Accuracy Rate</div>
                            </td>
                            <td>
                                <div class="number">0.847</div>
                                <div class="label">F1 Score</div>
                            </td>
                            <td>
                                <div class="number">0.823</div>
                                <div class="label">Last Quarter</div>
                            </td>
                            <td>
                                <div class="number" style="color: #27ae60;">+2.9%</div>
                                <div class="label">Improvement</div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div class="number">12ms</div>
                                <div class="label">Latency</div>
                            </td>
                            <td>
                                <div class="number">2.4k</div>
                                <div class="label">RPS</div>
                            </td>
                            <td>
                                <div class="number">2.1k</div>
                                <div class="label">Last Quarter</div>
                            </td>
                            <td>
                                <div class="number" style="color: #27ae60;">+14%</div>
                                <div class="label">Throughput</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
