<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>学术极简</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Times New Roman", Georgia, serif;
            background: #fff;
            padding: 60px;
            color: #1a1a1a;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .title {
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            line-height: 1.6;
        }
        th {
            border-bottom: 2px solid #1a1a1a;
            padding: 12px 8px;
            text-align: left;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 11px;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover td {
            background: #fafafa;
        }
        .num {
            font-family: "Courier New", monospace;
            text-align: right;
        }
        .cite {
            font-size: 10px;
            vertical-align: super;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Table 1: Experimental Results</div>
        <table>
            <thead>
                <tr>
                    <th>Condition</th>
                    <th>Sample Size</th>
                    <th class="num">Mean</th>
                    <th class="num">SD</th>
                    <th class="num">p-value</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Control Group</td>
                    <td>150</td>
                    <td class="num">24.5</td>
                    <td class="num">3.2</td>
                    <td class="num">—</td>
                </tr>
                <tr>
                    <td>Treatment A</td>
                    <td>148</td>
                    <td class="num">28.3</td>
                    <td class="num">4.1</td>
                    <td class="num">&lt;0.001<span class="cite">*</span></td>
                </tr>
                <tr>
                    <td>Treatment B</td>
                    <td>152</td>
                    <td class="num">26.7</td>
                    <td class="num">3.8</td>
                    <td class="num">0.042<span class="cite">*</span></td>
                </tr>
                <tr>
                    <td>Treatment C</td>
                    <td>147</td>
                    <td class="num">25.1</td>
                    <td class="num">3.5</td>
                    <td class="num">0.312</td>
                </tr>
            </tbody>
        </table>
        <p style="font-size: 10px; color: #666; margin-top: 20px;"><span class="cite">*</span> Significant at α = 0.05 level</p>
    </div>
</body>
</html>
