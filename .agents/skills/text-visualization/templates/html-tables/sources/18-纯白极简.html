<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>极简白</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: white;
            padding: 80px 60px;
            color: #000;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 15px 0;
            border-bottom: 1px solid #000;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 1px;
        }
        td {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .num {
            font-family: "SF Mono", monospace;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">Data</div>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Category</th>
                    <th class="num">Value</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Product A</td>
                    <td>Electronics</td>
                    <td class="num">1,234</td>
                </tr>
                <tr>
                    <td>Product B</td>
                    <td>Home</td>
                    <td class="num">856</td>
                </tr>
                <tr>
                    <td>Product C</td>
                    <td>Electronics</td>
                    <td class="num">2,341</td>
                </tr>
                <tr>
                    <td>Product D</td>
                    <td>Sports</td>
                    <td class="num">567</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
