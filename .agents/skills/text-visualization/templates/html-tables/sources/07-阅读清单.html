<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>阅读清单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, serif;
            background: #faf8f5;
            padding: 50px;
            color: #3d3d3d;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .header h1 {
            font-size: 28px;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .header p {
            color: #888;
            font-style: italic;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        th {
            text-align: left;
            padding: 15px 10px;
            color: #888;
            font-weight: normal;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #ddd;
        }
        td {
            padding: 20px 10px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }
        .book-title {
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        .book-author {
            font-size: 13px;
            color: #666;
            font-style: italic;
        }
        .rating {
            color: #d4a373;
            letter-spacing: 2px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: sans-serif;
        }
        .status-read { background: #e8f5e9; color: #2e7d32; }
        .status-reading { background: #fff3e0; color: #e65100; }
        .status-toread { background: #f5f5f5; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reading List 2026</h1>
            <p>"A reader lives a thousand lives before he dies."</p>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Book</th>
                    <th>Rating</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="book-title">Deep Work</div>
                        <div class="book-author">Cal Newport</div>
                    </td>
                    <td class="rating">★★★★★</td>
                    <td><span class="status status-read">Finished</span></td>
                </tr>
                <tr>
                    <td>
                        <div class="book-title">Thinking, Fast and Slow</div>
                        <div class="book-author">Daniel Kahneman</div>
                    </td>
                    <td class="rating">★★★★☆</td>
                    <td><span class="status status-reading">Reading</span></td>
                </tr>
                <tr>
                    <td>
                        <div class="book-title">The Art of Learning</div>
                        <div class="book-author">Josh Waitzkin</div>
                    </td>
                    <td class="rating">—</td>
                    <td><span class="status status-toread">To Read</span></td>
                </tr>
                <tr>
                    <td>
                        <div class="book-title">Atomic Habits</div>
                        <div class="book-author">James Clear</div>
                    </td>
                    <td class="rating">★★★★★</td>
                    <td><span class="status status-read">Finished</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
