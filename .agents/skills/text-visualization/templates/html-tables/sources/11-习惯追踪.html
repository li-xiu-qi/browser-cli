<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>习惯追踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #fafafa;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .subtitle {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        .habit-table {
            width: 100%;
        }
        .habit-row {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .habit-name {
            width: 150px;
            font-weight: 500;
            color: #333;
        }
        .habit-days {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        .day {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .day.done {
            background: #4caf50;
            color: white;
        }
        .day.miss {
            background: #ffebee;
            color: #e57373;
        }
        .day.future {
            background: #f5f5f5;
            color: #ccc;
        }
        .streak {
            width: 80px;
            text-align: right;
            font-size: 14px;
            color: #666;
        }
        .streak-number {
            font-weight: 700;
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">February Habits</div>
            <div class="subtitle">Week 06: Feb 5-11</div>
        </div>
        <div class="habit-table">
            <div class="habit-row">
                <div class="habit-name">Reading</div>
                <div class="habit-days">
                    <div class="day done">M</div>
                    <div class="day done">T</div>
                    <div class="day done">W</div>
                    <div class="day miss">T</div>
                    <div class="day done">F</div>
                    <div class="day future">S</div>
                    <div class="day future">S</div>
                </div>
                <div class="streak"><span class="streak-number">12</span> days</div>
            </div>
            <div class="habit-row">
                <div class="habit-name">Exercise</div>
                <div class="habit-days">
                    <div class="day done">M</div>
                    <div class="day miss">T</div>
                    <div class="day done">W</div>
                    <div class="day done">T</div>
                    <div class="day done">F</div>
                    <div class="day future">S</div>
                    <div class="day future">S</div>
                </div>
                <div class="streak"><span class="streak-number">8</span> days</div>
            </div>
            <div class="habit-row">
                <div class="habit-name">Meditation</div>
                <div class="habit-days">
                    <div class="day done">M</div>
                    <div class="day done">T</div>
                    <div class="day done">W</div>
                    <div class="day done">T</div>
                    <div class="day miss">F</div>
                    <div class="day future">S</div>
                    <div class="day future">S</div>
                </div>
                <div class="streak"><span class="streak-number">5</span> days</div>
            </div>
            <div class="habit-row">
                <div class="habit-name">Coding</div>
                <div class="habit-days">
                    <div class="day done">M</div>
                    <div class="day done">T</div>
                    <div class="day done">W</div>
                    <div class="day done">T</div>
                    <div class="day done">F</div>
                    <div class="day future">S</div>
                    <div class="day future">S</div>
                </div>
                <div class="streak"><span class="streak-number">21</span> days</div>
            </div>
        </div>
    </div>
</body>
</html>
